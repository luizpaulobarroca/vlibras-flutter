name: vlibras_flutter
description: Plugin Flutter para tradução de texto para LIBRAS com avatar 3D VLibras. Suporta Flutter Web via HtmlElementView.
version: 0.1.0
homepage: https://github.com/example/vlibras_flutter
topics:
  - accessibility
  - libras
  - sign-language
  - vlibras

environment:
  sdk: '>=3.7.2 <4.0.0'
  flutter: '>=3.7.2'

dependencies:
  flutter:
    sdk: flutter
  web: ^1.0.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^0.3.0

flutter:
  plugin:
    platforms:
      web: {}
  assets:
    - assets/vlibras.js
